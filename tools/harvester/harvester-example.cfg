# harvester.cfg -- Proper Tools Field Notes
#
# Configuration for the harvester tool. Drives extraction of canonical
# artefacts from the fieldwork/ directory tree, and aggregation of those
# artefacts into the public RSS feed.
#
# IMPORTANT: this config assumes the canonical-archive footer in each
# Field Note uses class="archive-note" (not class="note"). The
# class="note" name is reserved for manicule editorial asides that MUST
# survive harvesting. If your existing Field Notes use class="note" for
# the footer, run:
#
#     find fieldwork -name index.html -exec sed -i \
#         's/class="note"/class="archive-note"/' {} \;
#
# ...but only after confirming that no manicule asides also use that class.
# A safer approach: rename the footer-specific note class explicitly in
# the template and leave manicules as p.note.

# ---- Walking ----

[walk]
# Glob applied to paths relative to the input directory. Field Notes
# follow the convention of one directory per note with index.html inside.
pattern = */index.html


# ---- Extraction ----

[extractor]
# The container element that wraps each Field Note's body.
container_tag = article
container_class = essay

# The container in which to look for the <h1> -- usually the same as
# the body container, but separable for unusual layouts.
h1_container_tag = article
h1_container_class = essay

# Elements to remove from the extracted fragment. Format is a
# comma-separated list of "tag" or "tag.class" entries.
#
# - h1                : the title (we have it from the meta extractor;
#                       no need to duplicate in the body).
# - div.meta          : the publication-date / archive-link block.
# - p.archive-note    : the trailing "If you received this via email..."
#                       footer paragraph. Manicule asides use class="note"
#                       and are NOT stripped.
strip = h1, div.meta, p.archive-note


# ---- Output ----

[output]
# Base URL for canonical links. Used both for individual artefact
# canonical-URL fields (when og:url is missing) and for the standalone
# HTML wrapper's canonical reference.
canonical_base = https://propertools.be/fieldwork

# URL of the canonical CSS, embedded in the standalone HTML. The
# standalone file also carries a tiny embedded CSS fallback that
# renders cleanly when the canonical site is unreachable.
canonical_css = https://propertools.be/assets/css/main.css

# Site root, used to rewrite root-relative URLs (/path) to absolute
# in emitted fragments. Defaults to feed.site_url if not set, which
# is correct for most configs. Only set this if the site root differs
# from the feed's site_url.
# site_base = https://propertools.be


# ---- Feed channel metadata ----
#
# Used by `harvester feed` to populate the RSS channel block.
# All values are XML-escaped on emission.

[feed]
title = Proper Tools — Field Notes
description = Hard Problems Made Legible — Field Notes from Proper Tools, an independent advisory practice on systemic infrastructure risk and long-horizon failure modes.
site_url = https://propertools.be
link = https://propertools.be/fieldwork/
feed_url = https://propertools.be/feed.xml
language = en
copyright = Proper Tools SRL
editor = hello@propertools.be (Trey)
author = hello@propertools.be (Trey Darley)
image = https://propertools.be/assets/img/propertools-logo.png

# TTL in minutes. Hint to feed readers about refresh cadence.
# 1440 minutes = once per day. Optional.
ttl = 1440

# Footer appended to each item's content:encoded. {url} and {url_short}
# are interpolated. {url_short} is {url} with the scheme stripped.
#
# NOTE: no leading <hr>. The source HTML already terminates the body with
# its own <hr> separator before the (now-stripped) email-recipient note.
# Adding another <hr> here produces a double separator.
archive_footer = <p><em>Canonical archive version: <a href="{url}">{url_short}</a></em></p>
